name: Build binaries

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  PROJECT_NAME: mdv

permissions:
  contents: write

jobs:
  linux:
    name: Linux target ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - i686-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - sparc64-unknown-linux-gnu

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          save-if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}

      - name: Clean target before cross build
        run: rm -rf target

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Ensure artifacts directory
        run: mkdir -p artifacts

      - name: Package zip
        run: |
          binary="target/${{ matrix.target }}/release/${PROJECT_NAME}"
          if [ ! -f "$binary" ]; then
            echo "::error::Binary artifact not found: $binary" >&2
            exit 1
          fi
          zip -j "artifacts/${PROJECT_NAME}-${{ matrix.target }}.zip" "$binary"

      - name: Install cargo-deb
        if: contains(matrix.target, 'linux-gnu') || contains(matrix.target, 'linux-musl')
        run: cargo install cargo-deb --locked

      - name: Build deb package
        if: contains(matrix.target, 'linux-gnu') || contains(matrix.target, 'linux-musl')
        run: cargo deb --no-build --target ${{ matrix.target }} --output "artifacts/${PROJECT_NAME}-${{ matrix.target }}.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mdv-${{ matrix.target }}
          path: artifacts/*

  macos:
    name: macOS target ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package zip
        run: |
          mkdir -p artifacts
          binary="target/${{ matrix.target }}/release/${PROJECT_NAME}"
          if [ ! -f "$binary" ]; then
            echo "::error::Binary artifact not found: $binary" >&2
            exit 1
          fi
          zip -j "artifacts/${PROJECT_NAME}-${{ matrix.target }}.zip" "$binary"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdv-${{ matrix.target }}
          path: artifacts/*

  windows:
    name: Windows target ${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $binary = "target/${{ matrix.target }}/release/${env:PROJECT_NAME}.exe"
          if (-not (Test-Path $binary)) {
            throw "Binary artifact not found: $binary"
          }
          Compress-Archive -Path $binary -DestinationPath ("artifacts/${env:PROJECT_NAME}-${{ matrix.target }}.zip")

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mdv-${{ matrix.target }}
          path: artifacts/*

  snap:
    name: Snap package ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install LXD and Snapcraft
        run: |
          sudo groupadd --force --system lxd
          sudo usermod --append --groups lxd runner
          sudo snap install lxd
          sudo lxd init --auto
          sudo iptables -P FORWARD ACCEPT
          sudo snap install --channel 8.x/stable --classic snapcraft

      - name: Build snap
        run: sudo -u runner -E snapcraft --use-lxd --build-for=${{ matrix.arch }}

      - name: Collect snaps
        run: |
          set -euo pipefail
          mkdir -p artifacts
          snap_name=$(ls *_${{ matrix.arch }}.snap)
          mv "$snap_name" "artifacts/${PROJECT_NAME}-${{ matrix.arch }}.snap"

      - name: Upload snaps
        uses: actions/upload-artifact@v7
        with:
          name: mdv-snap-${{ matrix.arch }}
          path: artifacts/*

  nix:
    name: Nix package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Evaluate flake outputs
        run: nix flake check --no-build --print-build-logs

      - name: Build Nix package
        run: nix build .#packages.x86_64-linux.default --print-build-logs

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux
      - macos
      - windows
      - snap
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Set version
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_ENV"

      - name: Extract tag metadata
        id: tag_meta
        run: |
          # Fallback order: changelog entry -> tag annotation -> commit message
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          COMMIT=$(git rev-list -n 1 "$TAG")
          TAG_MESSAGE=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)')
          if [ -z "${TAG_MESSAGE//[$'\r\n\t ']/}" ]; then
            TAG_MESSAGE=$(git tag -l "$TAG" --format='%(contents)')
          fi
          COMMIT_MESSAGE=$(git show -s --format=%B "$COMMIT")
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION=$(awk -v ver="$VERSION" '
              function trim(str) {
                sub(/^[[:space:]]+/, "", str)
                sub(/[[:space:]]+$/, "", str)
                return str
              }
              /^## \[/ {
                if (match($0, /^## \[([^\]]+)\]/, m)) {
                  heading = trim(m[1])
                  if (found && heading != ver) {
                    exit
                  }
                  if (!found && heading == ver) {
                    found = 1
                    next
                  }
                }
              }
              found {
                if (!printed) {
                  if ($0 ~ /^[[:space:]]*$/) {
                    next
                  }
                  printed = 1
                  print
                  next
                }
                print
              }
            ' CHANGELOG.md)
          fi
          if [ -n "$(printf '%s' "$CHANGELOG_SECTION" | tr -d $'\r\n\t ')" ]; then
            MESSAGE="$CHANGELOG_SECTION"
          elif [ -n "$(printf '%s' "$TAG_MESSAGE" | tr -d $'\r\n\t ')" ]; then
            MESSAGE="$TAG_MESSAGE"
          else
            MESSAGE="$COMMIT_MESSAGE"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          printf 'message<<EOF\n%s\nEOF\n' "$MESSAGE" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub release notes
        id: gh_notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(gh api repos/${GITHUB_REPOSITORY}/releases/generate-notes \
            -f tag_name="${{ steps.tag_meta.outputs.tag }}" \
            -f target_commitish="${{ steps.tag_meta.outputs.commit }}")
          BODY=$(echo "$RESPONSE" | jq -r '.body // ""')
          printf 'body<<EOF\n%s\nEOF\n' "$BODY" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts with version
        run: |
          shopt -s nullglob
          for file in dist/*; do
            base=$(basename "$file")
            new_base=${base/${PROJECT_NAME}/${PROJECT_NAME}-${VERSION}}
            mv "$file" "dist/${new_base}"
          done

      - name: Compose release body
        run: |
          {
            printf '%s\n\n' "$TAG_MESSAGE";
            echo '---';
            echo;
            printf '%s\n' "$GENERATED_NOTES";
          } > release-notes.md
        env:
          TAG_MESSAGE: ${{ steps.tag_meta.outputs.message }}
          GENERATED_NOTES: ${{ steps.gh_notes.outputs.body }}

      - name: List packaged files
        run: ls -R dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release-notes.md
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
